<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>explore: dv.gl interactive</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
      #scene { width: 100vw; height: 100vh; display: block; touch-action: none; }
      #status { position: fixed; top: 8px; left: 8px; color: #9f9; font: 13px monospace; z-index: 9; }
      #clock { position: fixed; top: 8px; right: 12px; color: #8df; font: 13px monospace; z-index: 9; }
      #bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 12px;
             align-items: center; padding: 14px 18px; background: rgba(16,20,38,0.95);
             border-top: 1px solid #35406b; z-index: 9; }
      #bar label { color: #8da2d8; font: 12px monospace; white-space: nowrap; }
      #time { flex: 1; height: 22px; accent-color: #6ab7ff; cursor: pointer; }
      button, select { background: #26335c; color: #dbe6ff; border: 1px solid #4a5a94;
                       border-radius: 5px; font: 14px monospace; padding: 6px 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="status">loading...</div>
    <div id="clock"></div>
    <canvas id="scene"></canvas>
    <div id="bar">
      <button id="play">pause</button>
      <select id="speed">
        <option value="60">60x</option>
        <option value="600" selected>600x</option>
        <option value="6000">6000x</option>
      </select>
      <label><input id="ecef" type="checkbox" /> earth-fixed</label>
      <label><input id="tracks" type="checkbox" /> tracks &plusmn;1 orbit</label>
      <label for="time">timeline (7 days) &#8594;</label>
      <input id="time" type="range" min="0" max="10079" value="0" step="1" />
    </div>
    <script type="module" src="./src/explore.ts"></script>
  </body>
</html>
