<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>explore: dv.gl interactive</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
      #scene { width: 100vw; height: 100vh; display: block; touch-action: none; }
      #status { position: fixed; top: 8px; left: 8px; color: #9f9; font: 13px monospace; z-index: 9; }
      #clock { position: fixed; top: 8px; right: 12px; color: #8df; font: 13px monospace; z-index: 9; }
      #labelLayer { position: fixed; inset: 0; z-index: 8; pointer-events: none; }
      .objLabel { position: absolute; font: 11px monospace; color: #dfe8ff;
                  text-shadow: 0 0 3px #000, 0 0 3px #000; white-space: nowrap; }
      #pick { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 9;
              color: #eef; font: 13px monospace; padding: 3px 10px; border-radius: 4px;
              background: rgba(20,26,48,0.9); display: none; pointer-events: none; }
      #bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 12px;
             align-items: center; padding: 14px 18px; background: rgba(16,20,38,0.95);
             border-top: 1px solid #35406b; z-index: 9; }
      #bar label { color: #8da2d8; font: 12px monospace; white-space: nowrap; }
      #timeMarks { position: fixed; height: 7px; z-index: 10; pointer-events: none; }
      #timeMarks .tick { position: absolute; width: 2px; height: 7px; transform: translateX(-1px); border-radius: 1px; }
      #time { flex: 1; height: 22px; accent-color: #6ab7ff; cursor: pointer; }
      button, select { background: #26335c; color: #dbe6ff; border: 1px solid #4a5a94;
                       border-radius: 5px; font: 14px monospace; padding: 6px 14px; cursor: pointer; }
      #objects { position: fixed; top: 32px; right: 12px; z-index: 9;
                 background: rgba(16,20,38,0.92); border: 1px solid #35406b;
                 border-radius: 6px; font: 12px monospace; color: #cdd8f0;
                 min-width: 168px; display: none; }
      #objectsHead { padding: 7px 10px; cursor: pointer; user-select: none;
                     color: #8da2d8; border-bottom: 1px solid #2a3252; letter-spacing: .04em; }
      #objectsBody { padding: 4px 4px 6px; }
      #objects.collapsed #objectsBody { display: none; }
      #objects.collapsed #objectsHead { border-bottom: none; }
      .objRow { display: flex; align-items: center; gap: 8px; padding: 4px 8px; cursor: pointer; }
      .objRow:hover { background: rgba(90,120,200,0.12); }
      .objSwatch { width: 11px; height: 11px; border-radius: 2px; flex: none; }
      .objName { flex: 1; }
      .objCount { color: #7787ad; }
      .objRow.off .objName, .objRow.off .objCount { color: #55607d; }
      .objRow.off .objSwatch { opacity: 0.25; }
    </style>
  </head>
  <body>
    <div id="status">loading...</div>
    <div id="clock"></div>
    <div id="pick"></div>
    <div id="timeMarks"></div>
    <div id="objects"><div id="objectsHead">&#9662; mission objects</div><div id="objectsBody"></div></div>
    <div id="labelLayer"></div>
    <canvas id="scene"></canvas>
    <div id="bar">
      <button id="play">pause</button>
      <select id="speed">
        <option value="60">60x</option>
        <option value="600" selected>600x</option>
        <option value="6000">6000x</option>
      </select>
      <label><input id="ecef" type="checkbox" /> earth-fixed</label>
      <label>tracks
        <select id="trackmode">
          <option value="none" selected>none</option>
          <option value="orbit">orbit &plusmn;1</option>
          <option value="ground">ground</option>
        </select>
      </label>
      <label><input id="stations" type="checkbox" /> stations</label>
      <label><input id="footprints" type="checkbox" /> footprints</label>
      <label><input id="coverage" type="checkbox" /> coverage</label>
      <label><input id="labels" type="checkbox" /> labels</label>
      <label><input id="heading" type="checkbox" /> heading</label>
      <label for="time">timeline (7 days) &#8594;</label>
      <input id="time" type="range" min="0" max="10079" value="0" step="1" />
    </div>
    <script type="module" src="./src/explore.ts"></script>
  </body>
</html>
