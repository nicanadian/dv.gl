<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>@dvgl/viewer embed check</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
      /* the HOST owns this element; the Scene never reaches for it by id */
      #view { width: 100vw; height: 100vh; display: block; touch-action: none; }
      #status { position: fixed; top: 8px; left: 8px; color: #9f9; font: 13px monospace; z-index: 9; }
      #pick { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 9;
              color: #eef; font: 13px monospace; padding: 3px 10px; border-radius: 4px;
              background: rgba(20,26,48,0.9); display: none; }
    </style>
  </head>
  <body>
    <div id="status">loading @dvgl/viewer...</div>
    <div id="pick"></div>
    <canvas id="view"></canvas>
    <script type="module" src="./src/viewer-demo.ts"></script>
  </body>
</html>
